<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1440px; height: 900px; overflow: hidden; background: #18181C; }
iframe { width: 1440px; height: 900px; border: none; display: block; }
</style>
</head>
<body>
<iframe id="f" src="/index.html"></iframe>
<script>
  const scrollTo = parseInt(new URLSearchParams(location.search).get('y') || '0');
  const iframe = document.getElementById('f');
  iframe.onload = function() {
    try {
      iframe.contentWindow.scrollTo(0, scrollTo);
      // Also trigger reveal animations
      iframe.contentWindow.document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
      iframe.contentWindow.document.querySelectorAll('.ecg-reveal').forEach(el => el.classList.add('drawn'));
    } catch(e) { console.log(e); }
  };
</script>
</body>
</html>
